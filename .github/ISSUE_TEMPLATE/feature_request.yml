name: Feature Request
description: Suggest a new feature or improvement for Arceval.
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please describe your idea clearly
        so we can evaluate and prioritize it.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What limitation are you encountering?
      placeholder: Describe the problem or gap this feature would address.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or behavior you would like to see.
      placeholder: Describe your ideal implementation.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
      placeholder: Describe any alternatives you have considered.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area of Arceval does this relate to?
      options:
        - Analysis / Scoring
        - AI Provider Support
        - CLI / User Experience
        - Output / Reporting
        - Configuration
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information, mockups, or references that support this request.
      placeholder: Add any other context here.
    validations:
      required: false
